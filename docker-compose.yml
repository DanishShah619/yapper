version: '3.8'

services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: nexchat-livekit
    restart: unless-stopped
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'
    volumes:
      - ./livekit.yaml:/livekit.yaml:ro
    command: --config /livekit.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:7880 || true']
      interval: 10s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:16-alpine
    container_name: nexchat-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: nexchat
      POSTGRES_PASSWORD: nexchat_dev
      POSTGRES_DB: nexchat
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    volumes:
      - nexchat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexchat']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexchat-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - nexchat_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    container_name: nexchat-coturn
    restart: unless-stopped
    ports:
      - '3478:3478'
      - '3478:3478/udp'
    command: >
      -n --log-file=stdout
      --min-port=49152 --max-port=65535
      --realm=localhost
      --user=user:password
      --lt-cred-mech

volumes:
  nexchat_pgdata:
  nexchat_redis:
