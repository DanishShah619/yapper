# ─── Scalars ─────────────────────────────────────────────────
scalar DateTime

# ─── Enums ───────────────────────────────────────────────────
enum FriendshipStatus {
  PENDING
  ACCEPTED
  DECLINED
}

enum RoomType {
  PERSISTENT
  EPHEMERAL
}

enum MemberRole {
  ADMIN
  MEMBER
}

enum MemberAddPolicy {
  ADMIN_ONLY
  OPEN
}

enum KeyDeliveryStatus {
  PENDING
  DELIVERED
  ACKNOWLEDGED
  DECRYPTED
}

# ─── Types ───────────────────────────────────────────────────
type User {
  id: ID!
  email: String!
  username: String!
  publicKey: String
  avatarUrl: String
  online: Boolean
  createdAt: DateTime!
}

type PresenceEvent {
  userId: ID!
  online: Boolean!
}

type AuthPayload {
  token: String!
  user: User!
}

type Friendship {
  id: ID!
  requester: User!
  addressee: User!
  status: FriendshipStatus!
  createdAt: DateTime!
}

type Room {
  id: ID!
  name: String
  type: RoomType!
  locked: Boolean!
  members: [RoomMember!]!
  createdAt: DateTime!
}

type RoomMember {
  id: ID!
  user: User!
  role: MemberRole!
  mutedAt: DateTime
  joinedAt: DateTime!
}

type Message {
  id: ID!
  roomId: ID
  groupId: ID
  sender: User!
  encryptedPayload: String!
  ephemeral: Boolean!
  expiresAt: DateTime
  createdAt: DateTime!
}

type MessageConnection {
  edges: [Message!]!
  pageInfo: PageInfo!
}

type PageInfo {
  hasNextPage: Boolean!
  endCursor: String
}

type File {
  id: ID!
  roomId: ID!
  uploader: User!
  encryptedMetadata: String!
  createdAt: DateTime!
}

type Group {
  id: ID!
  name: String!
  type: RoomType!
  avatarUrl: String
  createdBy: ID!
  locked: Boolean!
  memberAddPolicy: MemberAddPolicy!
  members: [GroupMember!]!
  createdAt: DateTime!
}

type KeyRotationSignal {
  groupId: ID!
  remainingMemberIds: [ID!]!
}

type GroupMember {
  id: ID!
  user: User!
  role: MemberRole!
  mutedAt: DateTime
  joinedAt: DateTime!
  encryptedKey: String
}

type VideoRoom {
  id: ID!
  liveKitRoomId: String
  locked: Boolean!
  maxParticipants: Int!
  createdAt: DateTime!
}

type Post {
  id: ID!
  user: User!
  content: String!
  createdAt: DateTime!
}

type FeedItem {
  id: ID!
  post: Post!
  createdAt: DateTime!
}

type PeopleYouMayKnowSuggestion {
  user: User!
  mutualFriendsCount: Int!
}

type InviteLink {
  url: String!
  expiresAt: DateTime!
}

# ─── Key Delivery Tracking Types ────────────────────────────
type KeyShard {
  id: ID!
  roomId: ID!
  userId: ID!
  encryptedShard: String!
  createdAt: String!
}

type MemberDeliveryDetail {
  userId: ID!
  username: String!
  status: KeyDeliveryStatus!
  createdAt: String!
  deliveredAt: String
  acknowledgedAt: String
  decryptedAt: String
  retryCount: Int!
  isStale: Boolean!
  minutesSinceCreation: Int!
}

type KeyHealthReport {
  roomId: ID!
  totalMembers: Int!
  pending: Int!
  delivered: Int!
  acknowledged: Int!
  decrypted: Int!
  healthScore: Int!
  staleMembers: [String!]!
  isHealthy: Boolean!
}

type RedeliveryResult {
  success: Boolean!
  reason: String
}

# ─── Inputs ──────────────────────────────────────────────────
# BUG-3 FIX: KeyShardInput previously had a subscription definition
# (keyRotated) accidentally placed inside this input type. Removed.
input KeyShardInput {
  userId: ID!
  encryptedShard: String!
}

input WrappedKeyInput {
  memberId: ID!
  encryptedKey: String!
}

# ─── Queries ─────────────────────────────────────────────────
type Query {
  # Auth
  me: User!

  # Users
  user(username: String!): User

  # Social Graph
  connections: [User!]!
  connectionRequests: [Friendship!]!

  # Messaging
  conversation(id: ID!): Room
  conversations: [Room!]!
  messages(roomId: ID, groupId: ID, cursor: String, limit: Int): MessageConnection!
  missedEphemeralMessages(roomId: ID, groupId: ID, since: Float!): [Message!]!

  # Groups
  group(id: ID!): Group
  groups: [Group!]!

  # Key Escrow
  myKeyShard(roomId: ID!): KeyShard
  userPublicKeys(userIds: [ID!]!): [User!]!

  # Key Delivery Tracking (admin)
  roomKeyHealth(roomId: ID!): KeyHealthReport!
  memberKeyDeliveryDetails(roomId: ID!): [MemberDeliveryDetail!]!

  # Video
  getLiveKitToken(roomId: ID!): String!

  # V2 Stubs
  peopleYouMayKnow: [PeopleYouMayKnowSuggestion!]!
  feed(cursor: String, limit: Int): [FeedItem!]!
}

# ─── Mutations ───────────────────────────────────────────────
type Mutation {
  # Auth
  register(email: String!, username: String!, password: String!): AuthPayload!
  login(email: String!, password: String!): AuthPayload!
  logout: Boolean!

  # Social Graph
  sendConnectionRequest(username: String!): Friendship!
  respondToConnectionRequest(requestId: ID!, accept: Boolean!): Friendship!
  removeConnection(userId: ID!): Boolean!

  # Users
  updatePublicKey(publicKey: String!): User!

  # Rooms
  createRoom(name: String!, type: RoomType!): Room!
  createDM(username: String!): Room!
  inviteToRoom(roomId: ID!, username: String!): RoomMember!
  generateInviteLink(roomId: ID, groupId: ID, ttl: Int!): InviteLink!

  # Messages
  sendMessage(roomId: ID, groupId: ID, encryptedPayload: String!, ephemeral: Boolean, ttl: Int): Message!

  # Files
  uploadFile(roomId: ID!, encryptedBlob: String!, encryptedMetadata: String!): File!

  # Groups
  createGroup(name: String!, type: RoomType!, avatar: String): Group!
  addGroupMember(groupId: ID!, username: String!): GroupMember!
  removeGroupMember(groupId: ID!, userId: ID!): Boolean!
  promoteGroupMember(groupId: ID!, userId: ID!): GroupMember!
  transferGroupOwnership(groupId: ID!, userId: ID!): Group!
  submitRotatedGroupKeys(groupId: ID!, wrappedKeys: [WrappedKeyInput!]!): Boolean!
  lockGroup(groupId: ID!): Group!
  unlockGroup(groupId: ID!): Group!
  deleteGroup(groupId: ID!): Boolean!
  muteGroupMember(groupId: ID!, userId: ID!): GroupMember!
  leaveGroup(groupId: ID!): Boolean!
  updateMemberAddPolicy(groupId: ID!, policy: MemberAddPolicy!): Group!

  # Video
  createVideoRoom(maxParticipants: Int): VideoRoom!
  approveParticipant(roomId: ID!, participantId: ID!): Boolean!
  rejectParticipant(roomId: ID!, participantId: ID!): Boolean!
  lockVideoRoom(roomId: ID!): VideoRoom!

  # Key Escrow
  uploadKeyShards(roomId: ID!, shards: [KeyShardInput!]!): Boolean!
  # BUG-4 FIX: previously had duplicate rotateKey(groupId) AND rotateKey(roomId).
  # Removed the old V2-stub rotateKey(groupId) — only the E2EE room key rotation remains.
  rotateKey(roomId: ID!, newShards: [KeyShardInput!]!, removedMemberId: ID): Boolean!
  setFallbackAdmin(roomId: ID!, userId: ID!): Boolean!
  promoteFallbackAdmin(roomId: ID!): Boolean!

  # Key Delivery Tracking
  redeliverKey(roomId: ID!, userId: ID!): RedeliveryResult!

  # V2 Stubs
  createPost(content: String!): Post!
}

# ─── Subscriptions ───────────────────────────────────────────
type Subscription {
  messageReceived(roomId: ID!): Message!
  presenceUpdated: PresenceEvent!
  waitingRoomUpdated(videoRoomId: ID!): Boolean!
  participantApproved(videoRoomId: ID!): Boolean!
  participantRejected(videoRoomId: ID!): Boolean!
  roomLocked(videoRoomId: ID!): Boolean!
  groupMemberUpdated(groupId: ID!): GroupMember!
  groupKeyRotationRequired(groupId: ID!): KeyRotationSignal!
  keyHealthUpdated(roomId: ID!): KeyHealthReport!
}
