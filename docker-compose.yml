version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexchat-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: nexchat
      POSTGRES_PASSWORD: nexchat_dev
      POSTGRES_DB: nexchat
    volumes:
      - nexchat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexchat']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexchat-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - nexchat_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexchat_pgdata:
  nexchat_redis:
